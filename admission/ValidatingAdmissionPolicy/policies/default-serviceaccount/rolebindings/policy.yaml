apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: rolebinding-default-serviceaccount
  annotations:
    security.kubeapt.io/displayName: 'Default Serviceaccount'
    security.kubeapt.io/description: Do not bind powerful roles to the default ServiceAccount.
    security.kubeapt.io/resource: RoleBindings
    security.kubeapt.io/severity: "3"
    security.kubeapt.io/remediation: "Avoid binding the default ServiceAccount; use a named ServiceAccount. Fields: subjects[*].kind, subjects[*].name, subjects[*].namespace."
    policies.kolteq.com/validatingAdmissionPolicy: 066b5849-dd0f-5078-9c7d-16becccbc962
  labels:
    check-rolebinding-default-serviceaccount.security.kolteq.com/audit: 'false-true'
    check-rolebinding-default-serviceaccount.security.kolteq.com/enforce: 'false-true'
    check-rolebinding-default-serviceaccount.security.kolteq.com/warn: 'false-true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - rbac.authorization.k8s.io
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - rolebindings
  validations:
  - expression: |
      !has(object.subjects) || object.subjects.all(s,
        !(s.kind == "ServiceAccount" && s.name == "default")
      )
    message: |
      Do not bind powerful roles to the default ServiceAccount.
