apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: capabilities-add-netbindservice-containers
  annotations:
    security.kubeapt.io/displayName: 'Capabilities Add Netbindservice'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for capabilities-add-netbindservice/containers.
    security.kubeapt.io/resource: Containers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the capabilities-add-netbindservice/containers policy.
    policies.kolteq.com/validatingAdmissionPolicy: b101993a-4538-5f11-8e4b-5fa1795e1d4c
  labels:
    capabilities-add-netbindservice-containers.security.kolteq.com/audit: 'false-true'
    capabilities-add-netbindservice-containers.security.kolteq.com/enforce: 'false-true'
    capabilities-add-netbindservice-containers.security.kolteq.com/warn: 'false-true'
    pss.security.kolteq.com/audit: 'baseline-restricted'
    pss.security.kolteq.com/enforce: 'baseline-restricted'
    pss.security.kolteq.com/warn: 'baseline-restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: allowedCaps
      expression: >
        ["NET_BIND_SERVICE"]
  validations:
    - expression: >
        (has(object.spec.os) &&
         has(object.spec.os.name) &&
         object.spec.os.name.lowerAscii() == "windows") ||
        object.spec.containers.all(c,
          !has(c.securityContext) ||
          !has(c.securityContext.capabilities) ||
          !has(c.securityContext.capabilities.add) ||
          c.securityContext.capabilities.add.all(cap,
            variables.allowedCaps.exists(a, a == cap)
          )
        )
      message: >
        spec.containers[*].securityContext.capabilities.add must be undefined/nil or contain only "NET_BIND_SERVICE".
