apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: fsgroup-pod
  annotations:
    security.kubeapt.io/displayName: Fsgroup
    security.kubeapt.io/description: spec.securityContext.fsGroup must be undefined or a non-zero value (> 0).
    security.kubeapt.io/resource: Pods
    security.kubeapt.io/severity: "3"
    security.kubeapt.io/remediation: "Set spec.securityContext.fsGroup to >0 or omit it. Fields: spec.securityContext.fsGroup."
    policies.kolteq.com/validatingAdmissionPolicy: 4f688ec5-d914-51b4-86b5-c204447bae99
  labels:
    check-fsgroup-pod.security.kolteq.com/audit: 'false-true'
    check-fsgroup-pod.security.kolteq.com/enforce: 'false-true'
    check-fsgroup-pod.security.kolteq.com/warn: 'false-true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - ""
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - pods
  validations:
  - expression: |
      !has(object.spec.securityContext) || !has(object.spec.securityContext.fsGroup) || object.spec.securityContext.fsGroup > 0
    message: |
      spec.securityContext.fsGroup must be undefined or a non-zero value (> 0).
