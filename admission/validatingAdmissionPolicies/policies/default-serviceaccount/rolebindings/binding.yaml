apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: rolebinding-default-serviceaccount-namespace-optout-warn
  annotations:
    policies.kolteq.com/validatingAdmissionPolicy: 066b5849-dd0f-5078-9c7d-16becccbc962
  labels:
    check-rolebinding-default-serviceaccount.security.kolteq.com/warn: 'false-true'
    security.kolteq.com/warn: enabled
    check-rolebinding-default-serviceaccount.security.kolteq.com/audit: 'false-true'
    check-rolebinding-default-serviceaccount.security.kolteq.com/enforce: 'false-true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
spec:
  policyName: rolebinding-default-serviceaccount
  validationActions:
  - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
      - key: security.kolteq.com/warn
        operator: In
        values:
        - enabled
      - key: check-rolebinding-default-serviceaccount.security.kolteq.com/warn
        operator: NotIn
        values:
        - 'false'
---
