apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: prestop-httpget-host-initcontainers
  annotations:
    security.kubeapt.io/displayName: 'Prestop Httpget Host'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for prestop-httpget-host/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the prestop-httpget-host/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 58b389df-2e81-5365-ab89-4a0896e28b0b
  labels:
    prestop-httpget-host-initcontainers.security.kolteq.com/audit: 'false,true'
    prestop-httpget-host-initcontainers.security.kolteq.com/enforce: 'false,true'
    prestop-httpget-host-initcontainers.security.kolteq.com/warn: 'false,true'
    pss.security.kolteq.com/audit: 'baseline,restricted'
    pss.security.kolteq.com/enforce: 'baseline,restricted'
    pss.security.kolteq.com/warn: 'baseline,restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.lifecycle) ||
          !has(ic.lifecycle.preStop) ||
          !has(ic.lifecycle.preStop.httpGet) ||
          !has(ic.lifecycle.preStop.httpGet.host) ||
          ic.lifecycle.preStop.httpGet.host == ""
        )
      message: >
        spec.initContainers[*].lifecycle.preStop.httpGet.host must be undefined or empty ("").
