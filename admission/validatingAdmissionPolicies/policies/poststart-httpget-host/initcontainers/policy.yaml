apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: poststart-httpget-host-initcontainers
  annotations:
    security.kubeapt.io/displayName: 'Poststart Httpget Host'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for poststart-httpget-host/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the poststart-httpget-host/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: f65e41a7-ba4e-5fac-9498-55b00e4e84da
  labels:
    poststart-httpget-host-initcontainers.security.kolteq.com/audit: 'false - true'
    poststart-httpget-host-initcontainers.security.kolteq.com/enforce: 'false - true'
    poststart-httpget-host-initcontainers.security.kolteq.com/warn: 'false - true'
    pss.security.kolteq.com/audit: 'baseline - restricted'
    pss.security.kolteq.com/enforce: 'baseline - restricted'
    pss.security.kolteq.com/warn: 'baseline - restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.lifecycle) ||
          !has(ic.lifecycle.postStart) ||
          !has(ic.lifecycle.postStart.httpGet) ||
          !has(ic.lifecycle.postStart.httpGet.host) ||
          ic.lifecycle.postStart.httpGet.host == ""
        )
      message: >
        spec.initContainers[*].lifecycle.postStart.httpGet.host must be undefined or empty ("").
