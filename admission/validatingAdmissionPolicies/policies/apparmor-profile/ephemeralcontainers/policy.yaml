apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: apparmor-profile-ephemeralcontainers
  annotations:
    security.kubeapt.io/displayName: 'Apparmor Profile'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for apparmor-profile/ephemeralcontainers.
    security.kubeapt.io/resource: Ephemeralcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the apparmor-profile/ephemeralcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 690a8643-3b65-5216-8c68-7357be3e7c85
  labels:
    apparmor-profile-ephemeralcontainers.security.kolteq.com/audit: 'false,true'
    apparmor-profile-ephemeralcontainers.security.kolteq.com/enforce: 'false,true'
    apparmor-profile-ephemeralcontainers.security.kolteq.com/warn: 'false,true'
    pss.security.kolteq.com/audit: 'baseline,restricted'
    pss.security.kolteq.com/enforce: 'baseline,restricted'
    pss.security.kolteq.com/warn: 'baseline,restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods/ephemeralcontainers"]
  variables:
    - name: allowedAppArmorTypes
      expression: >
        ["RuntimeDefault","Localhost"]
  validations:
    - expression: >
        !has(object.spec.ephemeralContainers) ||
        object.spec.ephemeralContainers.all(ec,
          !has(ec.securityContext) ||
          !has(ec.securityContext.appArmorProfile) ||
          !has(ec.securityContext.appArmorProfile.type) ||
          variables.allowedAppArmorTypes.exists(t, t == ec.securityContext.appArmorProfile.type)
        )
      message: >
        spec.ephemeralContainers[*].securityContext.appArmorProfile.type must be undefined, RuntimeDefault, or Localhost.
