apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: allowed-hostports-containers
  annotations:
    security.kubeapt.io/displayName: Hostports
    security.kubeapt.io/description: ValidatingAdmissionPolicy for hostports/containers.
    security.kubeapt.io/resource: Containers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the hostports/containers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 7afbe2bb-969c-56ef-8255-84ee247d7e2b
  labels:
    allowed-hostports-containers.security.kolteq.com/audit: 'false-true'
    allowed-hostports-containers.security.kolteq.com/enforce: 'false-true'
    allowed-hostports-containers.security.kolteq.com/warn: 'false-true'
    pss.security.kolteq.com/audit: 'baseline-restricted'
    pss.security.kolteq.com/enforce: 'baseline-restricted'
    pss.security.kolteq.com/warn: 'baseline-restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: allowedHostPorts
      # expression: >
      #   [22, 80, 443]
      expression: >
        []
  validations:
    - expression: >
        object.spec.containers.all(c,
          !has(c.ports) ||
          c.ports.all(p,
            !has(p.hostPort) ||
            p.hostPort == 0 ||
            variables.allowedHostPorts.exists(h, h == p.hostPort)
          )
        )
      message: >
        hostPort must be undefined, 0, or in the variables.allowedHostPorts list.
