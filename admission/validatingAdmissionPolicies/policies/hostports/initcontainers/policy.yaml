apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: allowed-hostports-initcontainers
  annotations:
    security.kubeapt.io/displayName: Hostports
    security.kubeapt.io/description: ValidatingAdmissionPolicy for hostports/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the hostports/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 91493ef5-a1ab-5891-aeba-bd6111be2a90
  labels:
    allowed-hostports-initcontainers.security.kolteq.com/audit: 'false-true'
    allowed-hostports-initcontainers.security.kolteq.com/enforce: 'false-true'
    allowed-hostports-initcontainers.security.kolteq.com/warn: 'false-true'
    pss.security.kolteq.com/audit: 'baseline-restricted'
    pss.security.kolteq.com/enforce: 'baseline-restricted'
    pss.security.kolteq.com/warn: 'baseline-restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  variables:
    - name: allowedHostPorts
      # expression: >
      #   [22, 80, 443]
      expression: >
        []
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.ports) ||
          ic.ports.all(p,
            !has(p.hostPort) ||
            p.hostPort == 0 ||
            variables.allowedHostPorts.exists(h, h == p.hostPort)
          )
        )
      message: >
        initContainer hostPort must be undefined, 0, or in the variables.allowedHostPorts list.
