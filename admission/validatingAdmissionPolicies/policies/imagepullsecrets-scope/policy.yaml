apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: serviceaccount-imagepullsecrets-scope
  annotations:
    security.kubeapt.io/displayName: 'Imagepullsecrets Scope'
    security.kubeapt.io/description: Limit imagePullSecrets on ServiceAccounts; avoid sharing powerful registry creds broadly.
    security.kubeapt.io/resource: ServiceAccounts
    security.kubeapt.io/severity: "7"
    security.kubeapt.io/remediation: "Limit ServiceAccount imagePullSecrets to at most one. Fields: imagePullSecrets."
    policies.kolteq.com/validatingAdmissionPolicy: 35f446c8-61f2-5ffb-84ea-e829901e6ca9
  labels:
    check-serviceaccount-imagepullsecrets-scope.security.kolteq.com/audit: 'false - true'
    check-serviceaccount-imagepullsecrets-scope.security.kolteq.com/enforce: 'false - true'
    check-serviceaccount-imagepullsecrets-scope.security.kolteq.com/warn: 'false - true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - ""
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - serviceaccounts
  validations:
  - expression: |
      !has(object.imagePullSecrets) || size(object.imagePullSecrets) <= 1
    message: |
      Limit imagePullSecrets on ServiceAccounts; avoid sharing powerful registry creds broadly.
