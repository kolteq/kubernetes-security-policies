apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: startupprobe-tcpsocket-host-initcontainers
  annotations:
    security.kubeapt.io/displayName: 'Startupprobe Tcpsocket Host'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for startupprobe-tcpsocket-host/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the startupprobe-tcpsocket-host/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 470b05b3-302c-506c-8564-71abfcfc212c
  labels:
    pss.security.kolteq.com/audit: 'baseline - restricted'
    pss.security.kolteq.com/enforce: 'baseline - restricted'
    pss.security.kolteq.com/warn: 'baseline - restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
    startupprobe-tcpsocket-host-initcontainers.security.kolteq.com/audit: 'false - true'
    startupprobe-tcpsocket-host-initcontainers.security.kolteq.com/enforce: 'false - true'
    startupprobe-tcpsocket-host-initcontainers.security.kolteq.com/warn: 'false - true'
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.startupProbe) ||
          !has(ic.startupProbe.tcpSocket) ||
          !has(ic.startupProbe.tcpSocket.host) ||
          ic.startupProbe.tcpSocket.host == ""
        )
      message: >
        spec.initContainers[*].startupProbe.tcpSocket.host must be undefined or empty ("").
