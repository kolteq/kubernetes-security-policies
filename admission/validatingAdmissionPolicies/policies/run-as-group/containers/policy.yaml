apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: run-as-group-containers
  annotations:
    security.kubeapt.io/displayName: 'Run As Group'
    security.kubeapt.io/description: spec.containers[*].securityContext.runAsGroup must be undefined or a non-zero value (>
    security.kubeapt.io/resource: Containers
    security.kubeapt.io/severity: "6"
    security.kubeapt.io/remediation: "Set spec.containers[*].securityContext.runAsGroup to >0 or omit it. Fields: spec.containers[*].securityContext.runAsGroup."
    policies.kolteq.com/validatingAdmissionPolicy: 657580a6-fbdb-5107-a076-6ebc8e529ea9
  labels:
    check-run-as-group-containers.security.kolteq.com/audit: 'false,true'
    check-run-as-group-containers.security.kolteq.com/enforce: 'false,true'
    check-run-as-group-containers.security.kolteq.com/warn: 'false,true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - ""
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - pods
  validations:
  - expression: |
      object.spec.containers.all(c,
        !has(c.securityContext) ||
        !has(c.securityContext.runAsGroup) ||
        c.securityContext.runAsGroup > 0
      )
    message: |
      spec.containers[*].securityContext.runAsGroup must be undefined or a non-zero value (> 0).
