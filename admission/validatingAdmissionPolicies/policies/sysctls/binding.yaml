  labels:
    allowed-sysctls.security.kolteq.com/warn: 'false,true'
    pss.security.kolteq.com/warn: 'baseline,restricted'
    allowed-sysctls.security.kolteq.com/audit: 'false,true'
    allowed-sysctls.security.kolteq.com/enforce: 'false,true'
    pss.security.kolteq.com/audit: 'baseline,restricted'
