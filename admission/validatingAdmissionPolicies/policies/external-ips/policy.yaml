apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: service-external-ips
  annotations:
    security.kubeapt.io/displayName: 'External Ips'
    security.kubeapt.io/description: spec.externalIPs must not be set.
    security.kubeapt.io/resource: Services
    security.kubeapt.io/severity: "9"
    security.kubeapt.io/remediation: "Remove spec.externalIPs. Fields: spec.externalIPs."
    policies.kolteq.com/validatingAdmissionPolicy: 6dfa90b1-5902-5a18-a066-ab0d84833bb6
  labels:
    check-service-external-ips.security.kolteq.com/audit: 'false - true'
    check-service-external-ips.security.kolteq.com/enforce: 'false - true'
    check-service-external-ips.security.kolteq.com/warn: 'false - true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - ""
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - services
  validations:
  - expression: |
      !has(object.spec.externalIPs) || size(object.spec.externalIPs) == 0
    message: |
      spec.externalIPs must not be set.
