apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: prestop-tcpsocket-host-initcontainers
  annotations:
    security.kubeapt.io/displayName: 'Prestop Tcpsocket Host'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for prestop-tcpsocket-host/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the prestop-tcpsocket-host/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: e9889cae-b014-521a-be39-a48c4e89e848
  labels:
    prestop-tcpsocket-host-initcontainers.security.kolteq.com/audit: 'false-true'
    prestop-tcpsocket-host-initcontainers.security.kolteq.com/enforce: 'false-true'
    prestop-tcpsocket-host-initcontainers.security.kolteq.com/warn: 'false-true'
    pss.security.kolteq.com/audit: 'baseline-restricted'
    pss.security.kolteq.com/enforce: 'baseline-restricted'
    pss.security.kolteq.com/warn: 'baseline-restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.lifecycle) ||
          !has(ic.lifecycle.preStop) ||
          !has(ic.lifecycle.preStop.tcpSocket) ||
          !has(ic.lifecycle.preStop.tcpSocket.host) ||
          ic.lifecycle.preStop.tcpSocket.host == ""
        )
      message: >
        spec.initContainers[*].lifecycle.preStop.tcpSocket.host must be undefined or empty ("").
