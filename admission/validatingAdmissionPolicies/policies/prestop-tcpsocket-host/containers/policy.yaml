apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: prestop-tcpsocket-host-containers
  annotations:
    security.kubeapt.io/displayName: 'Prestop Tcpsocket Host'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for prestop-tcpsocket-host/containers.
    security.kubeapt.io/resource: Containers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the prestop-tcpsocket-host/containers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 867449cc-6334-5de8-8297-ed1fc38d214a
  labels:
    prestop-tcpsocket-host-containers.security.kolteq.com/audit: 'false,true'
    prestop-tcpsocket-host-containers.security.kolteq.com/enforce: 'false,true'
    prestop-tcpsocket-host-containers.security.kolteq.com/warn: 'false,true'
    pss.security.kolteq.com/audit: 'baseline,restricted'
    pss.security.kolteq.com/enforce: 'baseline,restricted'
    pss.security.kolteq.com/warn: 'baseline,restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        object.spec.containers.all(c,
          !has(c.lifecycle) ||
          !has(c.lifecycle.preStop) ||
          !has(c.lifecycle.preStop.tcpSocket) ||
          !has(c.lifecycle.preStop.tcpSocket.host) ||
          c.lifecycle.preStop.tcpSocket.host == ""
        )
      message: >
        spec.containers[*].lifecycle.preStop.tcpSocket.host must be undefined or empty ("").
