apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: service-account-name
  annotations:
    security.kubeapt.io/displayName: 'Service Account Name'
    security.kubeapt.io/description: spec.serviceAccountName must be set to a non-default service account.
    security.kubeapt.io/resource: Pods
    security.kubeapt.io/severity: "6"
    security.kubeapt.io/remediation: "Set spec.serviceAccountName to a non-default ServiceAccount. Fields: spec.serviceAccountName."
    policies.kolteq.com/validatingAdmissionPolicy: d3543428-8c36-57dd-823f-a11d87da645e
  labels:
    check-service-account-name.security.kolteq.com/audit: 'false - true'
    check-service-account-name.security.kolteq.com/enforce: 'false - true'
    check-service-account-name.security.kolteq.com/warn: 'false - true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:
      - ""
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - pods
  validations:
  - expression: |
      has(object.spec.serviceAccountName) && size(object.spec.serviceAccountName) > 0 && object.spec.serviceAccountName != "default"
    message: |
      spec.serviceAccountName must be set to a non-default service account.
