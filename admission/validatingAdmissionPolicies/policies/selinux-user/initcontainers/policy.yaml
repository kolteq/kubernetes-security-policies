apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: selinux-user-initcontainers
  annotations:
    security.kubeapt.io/displayName: 'Selinux User'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for selinux-user/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the selinux-user/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 84c37a26-8dad-569b-81b9-35eda037e453
  labels:
    pss.security.kolteq.com/audit: 'baseline-restricted'
    pss.security.kolteq.com/enforce: 'baseline-restricted'
    pss.security.kolteq.com/warn: 'baseline-restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
    selinux-user-initcontainers.security.kolteq.com/audit: 'false-true'
    selinux-user-initcontainers.security.kolteq.com/enforce: 'false-true'
    selinux-user-initcontainers.security.kolteq.com/warn: 'false-true'
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.securityContext) ||
          !has(ic.securityContext.seLinuxOptions) ||
          !has(ic.securityContext.seLinuxOptions.user) ||
          ic.securityContext.seLinuxOptions.user == ""
        )
      message: >
        spec.initContainers[*].securityContext.seLinuxOptions.user must be undefined or an empty string ("").
