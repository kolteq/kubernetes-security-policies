apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: role-serviceaccount-tokens-namespace-optout-warn
  annotations:
    policies.kolteq.com/validatingAdmissionPolicy: f421b021-cfd2-543e-b153-0f68a50f9668
  labels:
    check-role-serviceaccount-tokens.security.kolteq.com/warn: 'false-true'
    security.kolteq.com/warn: enabled
    check-role-serviceaccount-tokens.security.kolteq.com/audit: 'false-true'
    check-role-serviceaccount-tokens.security.kolteq.com/enforce: 'false-true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
spec:
  policyName: role-serviceaccount-tokens
  validationActions:
  - Warn
  matchResources:
    namespaceSelector:
      matchExpressions:
      - key: security.kolteq.com/warn
        operator: In
        values:
        - enabled
      - key: check-role-serviceaccount-tokens.security.kolteq.com/warn
        operator: NotIn
        values:
        - 'false'
---
