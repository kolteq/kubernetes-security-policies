apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: seccomp-profile-ephemeralcontainers-restricted
  annotations:
    security.kubeapt.io/displayName: 'Seccomp Profile Restricted'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for seccomp-profile-restricted/ephemeralcontainers.
    security.kubeapt.io/resource: Ephemeralcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the seccomp-profile-restricted/ephemeralcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 575fdecc-47b2-50f1-a344-eea767bbe580
  labels:
    pss.security.kolteq.com/audit: 'baseline - restricted'
    pss.security.kolteq.com/enforce: 'baseline - restricted'
    pss.security.kolteq.com/warn: 'baseline - restricted'
    seccomp-profile-ephemeralcontainers-restricted.security.kolteq.com/audit: 'false - true'
    seccomp-profile-ephemeralcontainers-restricted.security.kolteq.com/enforce: 'false - true'
    seccomp-profile-ephemeralcontainers-restricted.security.kolteq.com/warn: 'false - true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods/ephemeralcontainers"]
  variables:
    - name: allowedSeccompTypes
      expression: >
        ["RuntimeDefault","Localhost"]
    - name: podTypePresent
      expression: >
        has(object.spec.securityContext) &&
        has(object.spec.securityContext.seccompProfile) &&
        has(object.spec.securityContext.seccompProfile.type)
    - name: podTypeAllowed
      expression: >
        variables.podTypePresent &&
        variables.allowedSeccompTypes.exists(t, t == object.spec.securityContext.seccompProfile.type)
  validations:
    - expression: >
        (has(object.spec.os) &&
         has(object.spec.os.name) &&
         object.spec.os.name.lowerAscii() == "windows") ||
        (variables.podTypeAllowed &&
         (!has(object.spec.ephemeralContainers) ||
          object.spec.ephemeralContainers.all(ec,
            !has(ec.securityContext) ||
            !has(ec.securityContext.seccompProfile) ||
            !has(ec.securityContext.seccompProfile.type) ||
            variables.allowedSeccompTypes.exists(t, t == ec.securityContext.seccompProfile.type)
          )
         )
        )
        ||
        (!variables.podTypePresent &&
         (!has(object.spec.ephemeralContainers) ||
          object.spec.ephemeralContainers.all(ec,
            has(ec.securityContext) &&
            has(ec.securityContext.seccompProfile) &&
            has(ec.securityContext.seccompProfile.type) &&
            variables.allowedSeccompTypes.exists(t, t == ec.securityContext.seccompProfile.type)
          )
         )
        )
      message: >
        spec.ephemeralContainers[*].securityContext.seccompProfile.type must be "RuntimeDefault" or "Localhost".
        Ephemeral container fields may be undefined only when the Pod-level spec.securityContext.seccompProfile.type
        is set to "RuntimeDefault" or "Localhost"; otherwise every ephemeral container must set its own to one of those values.
