apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: allow-privilege-escalation-containers
  annotations:
    security.kubeapt.io/displayName: 'Privilege Escalation'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for privilege-escalation/containers.
    security.kubeapt.io/resource: Containers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the privilege-escalation/containers policy.
    policies.kolteq.com/validatingAdmissionPolicy: b5df7f0d-aef7-531f-84bc-b07c9b9f73ef
  labels:
    allow-privilege-escalation-containers.security.kolteq.com/audit: 'false-true'
    allow-privilege-escalation-containers.security.kolteq.com/enforce: 'false-true'
    allow-privilege-escalation-containers.security.kolteq.com/warn: 'false-true'
    pss.security.kolteq.com/audit: 'baseline-restricted'
    pss.security.kolteq.com/enforce: 'baseline-restricted'
    pss.security.kolteq.com/warn: 'baseline-restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        (has(object.spec.os) &&
         has(object.spec.os.name) &&
         object.spec.os.name.lowerAscii() == "windows") ||
        object.spec.containers.all(c,
          has(c.securityContext) &&
          has(c.securityContext.allowPrivilegeEscalation) &&
          c.securityContext.allowPrivilegeEscalation == false
        )
      message: >
        spec.containers[*].securityContext.allowPrivilegeEscalation must be set to false.
