apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: allow-privilege-escalation-ephemeralcontainers
  annotations:
    security.kubeapt.io/displayName: 'Privilege Escalation'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for privilege-escalation/ephemeralcontainers.
    security.kubeapt.io/resource: Ephemeralcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the privilege-escalation/ephemeralcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 4c079bb7-df2b-5f44-ac5f-5dae413c9929
  labels:
    allow-privilege-escalation-ephemeralcontainers.security.kolteq.com/audit: 'false - true'
    allow-privilege-escalation-ephemeralcontainers.security.kolteq.com/enforce: 'false - true'
    allow-privilege-escalation-ephemeralcontainers.security.kolteq.com/warn: 'false - true'
    pss.security.kolteq.com/audit: 'baseline - restricted'
    pss.security.kolteq.com/enforce: 'baseline - restricted'
    pss.security.kolteq.com/warn: 'baseline - restricted'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods/ephemeralcontainers"]
  validations:
    - expression: >
        (has(object.spec.os) &&
         has(object.spec.os.name) &&
         object.spec.os.name.lowerAscii() == "windows") ||
        !has(object.spec.ephemeralContainers) ||
        object.spec.ephemeralContainers.all(ec,
          has(ec.securityContext) &&
          has(ec.securityContext.allowPrivilegeEscalation) &&
          ec.securityContext.allowPrivilegeEscalation == false
        )
      message: >
        spec.ephemeralContainers[*].securityContext.allowPrivilegeEscalation must be set to false.
