apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: run-as-user-initcontainers
  annotations:
    security.kubeapt.io/displayName: 'Run As User'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for run-as-user/initcontainers.
    security.kubeapt.io/resource: Initcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the run-as-user/initcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: b0b12148-6f01-5444-af4f-61e5de824ba2
  labels:
    pss.security.kolteq.com/audit: 'baseline - restricted'
    pss.security.kolteq.com/enforce: 'baseline - restricted'
    pss.security.kolteq.com/warn: 'baseline - restricted'
    run-as-user-initcontainers.security.kolteq.com/audit: 'false - true'
    run-as-user-initcontainers.security.kolteq.com/enforce: 'false - true'
    run-as-user-initcontainers.security.kolteq.com/warn: 'false - true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(ic,
          !has(ic.securityContext) ||
          !has(ic.securityContext.runAsUser) ||
          ic.securityContext.runAsUser > 0
        )
      message: >
        spec.initContainers[*].securityContext.runAsUser must be undefined or a non-zero value (> 0).
