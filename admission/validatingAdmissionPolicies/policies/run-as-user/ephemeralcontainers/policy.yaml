apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: run-as-user-ephemeralcontainers
  annotations:
    security.kubeapt.io/displayName: 'Run As User'
    security.kubeapt.io/description: ValidatingAdmissionPolicy for run-as-user/ephemeralcontainers.
    security.kubeapt.io/resource: Ephemeralcontainers
    security.kubeapt.io/severity: medium
    security.kubeapt.io/remediation: Adjust workloads to satisfy the run-as-user/ephemeralcontainers policy.
    policies.kolteq.com/validatingAdmissionPolicy: 343cff14-4b3a-5c7d-a898-ae7cac2357c5
  labels:
    pss.security.kolteq.com/audit: 'baseline - restricted'
    pss.security.kolteq.com/enforce: 'baseline - restricted'
    pss.security.kolteq.com/warn: 'baseline - restricted'
    run-as-user-ephemeralcontainers.security.kolteq.com/audit: 'false - true'
    run-as-user-ephemeralcontainers.security.kolteq.com/enforce: 'false - true'
    run-as-user-ephemeralcontainers.security.kolteq.com/warn: 'false - true'
    security.kolteq.com/audit: enabled
    security.kolteq.com/enforce: enabled
    security.kolteq.com/warn: enabled
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE","UPDATE"]
        resources: ["pods/ephemeralcontainers"]
  validations:
    - expression: >
        !has(object.spec.ephemeralContainers) ||
        object.spec.ephemeralContainers.all(ec,
          !has(ec.securityContext) ||
          !has(ec.securityContext.runAsUser) ||
          ec.securityContext.runAsUser > 0
        )
      message: >
        spec.ephemeralContainers[*].securityContext.runAsUser must be undefined or a non-zero value (> 0).
